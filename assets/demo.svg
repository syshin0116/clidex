<svg width="100%" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg">

<rect width="680" height="360" rx="10" fill="rgb(10, 10, 10)"/>

<!-- Title bar -->
<rect width="680" height="36" rx="10" fill="rgb(26, 26, 26)"/>
<rect y="20" width="680" height="16" fill="rgb(26, 26, 26)"/>
<circle cx="20" cy="18" r="6" fill="rgb(255, 95, 87)"/>
<circle cx="40" cy="18" r="6" fill="rgb(255, 189, 46)"/>
<circle cx="60" cy="18" r="6" fill="rgb(40, 200, 64)"/>
<text x="340" y="22" text-anchor="middle" fill="rgb(136, 136, 136)" font-family="'SF Mono', Menlo, monospace" font-size="11">zsh</text>

<!-- Prompt + command (types in) -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
  <text x="24" y="66" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="13">
    <tspan fill="rgb(192, 132, 252)">~</tspan>
    <tspan fill="rgb(85, 85, 85)"> ❯ </tspan>
    <tspan fill="rgb(0, 255, 65)">clidex</tspan>
    <tspan fill="rgb(0, 191, 255)"> "csv to json"</tspan>
  </text>
</g>

<!-- Result 1: jq -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>
  <text x="24" y="98" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">
    <tspan fill="rgb(85, 85, 85)">-</tspan>
    <tspan fill="rgb(255, 215, 0)"> jq</tspan>
  </text>
  <text x="42" y="116" fill="rgb(85, 85, 85)" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">JSON processor</text>
  <text x="42" y="134" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">
    <tspan fill="rgb(85, 85, 85)">install: </tspan>
    <tspan fill="rgb(224, 224, 224)">brew install jq</tspan>
  </text>
  <text x="42" y="152" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">
    <tspan fill="rgb(85, 85, 85)">stars: </tspan>
    <tspan fill="rgb(224, 224, 224)">33,814</tspan>
  </text>
</g>

<!-- Result 2: fx -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
  <text x="24" y="182" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">
    <tspan fill="rgb(85, 85, 85)">-</tspan>
    <tspan fill="rgb(255, 215, 0)"> fx</tspan>
  </text>
  <text x="42" y="200" fill="rgb(85, 85, 85)" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">Command-line JSON viewer</text>
  <text x="42" y="218" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">
    <tspan fill="rgb(85, 85, 85)">install: </tspan>
    <tspan fill="rgb(224, 224, 224)">brew install fx</tspan>
  </text>
  <text x="42" y="236" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">
    <tspan fill="rgb(85, 85, 85)">stars: </tspan>
    <tspan fill="rgb(224, 224, 224)">20,336</tspan>
  </text>
</g>

<!-- Result 3: gron -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.3s" fill="freeze"/>
  <text x="24" y="266" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">
    <tspan fill="rgb(85, 85, 85)">-</tspan>
    <tspan fill="rgb(255, 215, 0)"> gron</tspan>
  </text>
  <text x="42" y="284" fill="rgb(85, 85, 85)" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">Make JSON greppable</text>
  <text x="42" y="302" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">
    <tspan fill="rgb(85, 85, 85)">install: </tspan>
    <tspan fill="rgb(224, 224, 224)">brew install gron</tspan>
  </text>
  <text x="42" y="320" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="12">
    <tspan fill="rgb(85, 85, 85)">stars: </tspan>
    <tspan fill="rgb(224, 224, 224)">14,398</tspan>
  </text>
</g>

<!-- Next prompt (appears last) -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze"/>
  <text x="24" y="350" font-family="'JetBrains Mono','Fira Code','SF Mono','Courier New',monospace" font-size="13">
    <tspan fill="rgb(192, 132, 252)">~</tspan>
    <tspan fill="rgb(85, 85, 85)"> ❯ </tspan>
    <tspan fill="rgb(0, 255, 65)">brew install</tspan>
    <tspan fill="rgb(0, 191, 255)"> jq</tspan>
  </text>
  <!-- Blinking cursor -->
  <rect x="188" y="338" width="8" height="16" rx="1" fill="rgb(241, 241, 241)">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.2s" begin="3.5s" repeatCount="indefinite"/>
  </rect>
</g>

</svg>
