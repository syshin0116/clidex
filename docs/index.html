  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .logo {
      max-width: 280px;
      width: 100%;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: 1.25rem;
      color: #8b949e;
      margin-bottom: 2rem;
    }

    /* Demo */
    .demo {
      margin-bottom: 3rem;
      text-align: center;
    }

    .demo img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #30363d;
    }

    /* Code blocks */
    .section {
      margin-bottom: 2.5rem;
    }

    .section h2 {
      font-size: 1.1rem;
      color: #f0f6fc;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    pre {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', Menlo, Consolas, monospace;
      font-size: 0.9rem;
      color: #e6edf3;
    }

    pre .prompt {
      color: #7ee787;
      user-select: none;
    }

    pre .comment {
      color: #8b949e;
    }

    /* Links section */
    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #21262d;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .links a:hover {
      border-color: #58a6ff;
      text-decoration: none;
    }

    .links a svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #21262d;
      color: #484f58;
      font-size: 0.85rem;
    }

    @media (max-width: 480px) {
      .container {
        padding: 2rem 1rem;
      }

      .tagline {
        font-size: 1.05rem;
      }

      pre {
        font-size: 0.8rem;
        padding: 0.75rem 1rem;
      }

      .links {
        gap: 0.75rem;
      }
    }

      <h2>Install</h2>
      <pre><span class="prompt">$ </span>cargo install clidex</pre>

      <pre><span class="comment"># Update the tool index</span>
<span class="prompt">$ </span>clidex update

<span class="prompt">$ </span>clidex "csv to json"</pre>
